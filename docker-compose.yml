services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cre_knowledge_engine
      POSTGRES_PASSWORD: cre
      POSTGRES_USER: cre
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cre -d cre_knowledge_engine"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
